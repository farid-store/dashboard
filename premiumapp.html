<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Produk Premium | Farid Store</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 0;
        margin: 0;
        background: #f4f6f9;
        color: #333;
    }

    /* === Header & Breadcrumb === */
    header {
        background: linear-gradient(135deg, #7367f0 0%, #9b8cfb 100%);
        padding: 30px 20px;
        color: white;
        box-shadow: 0 4px 12px rgba(115, 103, 240, 0.2);
    }
    .header-content {
        max-width: 1200px;
        margin: 0 auto;
    }
    .header-content h2 { margin: 0; font-size: 1.8rem; }
    .breadcrumb { opacity: 0.9; font-size: 0.9rem; margin-top: 8px; }

    /* === Main Container === */
    .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 0 20px;
    }

    /* === Search Bar === */
    .search-wrapper {
        position: relative;
        max-width: 400px;
        margin-bottom: 25px;
    }
    .search-wrapper i {
        position: absolute;
        top: 50%;
        left: 15px;
        transform: translateY(-50%);
        color: #888;
    }
    .search-input {
        padding: 12px 15px 12px 40px;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    .search-input:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(115, 103, 240, 0.2);
        border-color: #7367f0;
    }

    /* === Grid Produk (Responsif) === */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
        gap: 20px;
    }
    .no-results {
        text-align: center; color: #888; font-style: italic; grid-column: 1 / -1; padding: 40px 0;
    }

    /* === Card Animasi === */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .card {
        animation: fadeInUp 0.5s ease forwards;
        background: white; border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        padding: 15px; text-align: center;
        display: flex; flex-direction: column; justify-content: space-between;
        cursor: pointer; transition: all 0.3s ease;
        border: 1px solid transparent;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(115, 103, 240, 0.15);
        border-color: rgba(115, 103, 240, 0.3);
    }
    .card img {
        width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
        border-radius: 8px; background: #f8f9fa; margin-bottom: 12px;
    }
    .card h4 {
        margin: 0 0 12px 0; font-size: 0.95rem; flex-grow: 1;
        display: flex; align-items: center; justify-content: center;
    }
    .status {
        padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
    }
    .status.ready { background-color: #e8f5e9; color: #2e7d32; }
    .status.pending { background-color: #fff8e1; color: #f57f17; }

    /* === Modal === */
    .modal {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
        justify-content: center; align-items: center;
        padding: 20px; z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
    }
    .modal.show { display: flex; opacity: 1; }
    
    .modal-content {
        background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 650px; width: 100%; max-height: 90vh; overflow-y: auto;
        padding: 30px; position: relative; transform: scale(0.95); transition: transform 0.3s ease;
    }
    .modal.show .modal-content { transform: scale(1); }

    .modal-close {
        position: absolute; top: 15px; right: 20px; font-size: 24px;
        background: none; border: none; cursor: pointer; color: #888;
    }
    .modal-close:hover { color: #d32f2f; }

    .modal-body { display: flex; gap: 30px; flex-wrap: wrap; }
    .modal-image-wrapper { flex: 1 1 250px; }
    .modal-image-wrapper img { width: 100%; border-radius: 12px; object-fit: contain; background: #f8f9fa; }
    
    .modal-details { flex: 1 1 300px; display: flex; flex-direction: column; }
    .modal-details h3 { margin: 0 0 20px 0; font-size: 1.4rem; color: #333; }
    .modal-details label { font-weight: 600; margin-top: 15px; color: #555; font-size: 0.9rem; }
    .modal-details select, .modal-details input {
        margin-top: 8px; padding: 12px; font-size: 1rem;
        border-radius: 8px; border: 1px solid #ccc; transition: all 0.3s;
        box-sizing: border-box; width: 100%;
    }
    .modal-details select:focus, .modal-details input:focus {
        outline: none; border-color: #7367f0; box-shadow: 0 0 0 3px rgba(115, 103, 240, 0.2);
    }

    .btn-submit {
        margin-top: 25px; padding: 14px; font-size: 1rem; font-weight: 700;
        background: #7367f0; color: white; border: none; border-radius: 8px;
        cursor: pointer; transition: background 0.3s ease;
    }
    .btn-submit:hover:not(:disabled) { background: #5a4fcc; }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

    .status-message { margin-top: 15px; font-weight: 600; text-align: center; font-size: 0.9rem; }

    /* Responsive Modal Mobile */
    @media (max-width: 600px) {
        .modal-body { flex-direction: column; gap: 15px; }
        .modal-content { padding: 20px; }
    }
</style>
</head>
<body>

<header>
    <div class="header-content">
        <h2>Aplikasi Premium</h2>
        <p class="breadcrumb">Prabayar &gt; Aplikasi & Jasa Premium</p>
    </div>
</header>

<div class="container">
    <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Cari aplikasi atau layanan..." id="searchInput" class="search-input" />
    </div>
    
    <div id="productList" class="grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <button id="closeModal" class="modal-close"><i class="fas fa-times"></i></button>
        <div class="modal-body">
            <div class="modal-image-wrapper">
                <img id="modalImage" src="" alt="Produk" />
            </div>
            <div class="modal-details">
                <h3 id="modalName">Nama Produk</h3>

                <label for="periodSelect">Periode Langganan:</label>
                <select id="periodSelect">
                    <option value="1hari">1 Hari</option>
                    <option value="7hari">7 Hari</option>
                    <option value="1bulan">1 Bulan</option>
                    <option value="3bulan">3 Bulan</option>
                    <option value="12bulan">12 Bulan</option>
                </select>

                <label for="quantityInput">Jumlah Pesanan:</label>
                <input type="number" id="quantityInput" min="1" value="1" />

                <label for="contactInput">Kontak Anda (WA/Telegram):</label>
                <input type="text" id="contactInput" placeholder="Contoh: 0812xxx atau @username" />

                <button id="submitOrder" class="btn-submit">Pesan Sekarang</button>

</div>

        { name: "VIDIO PREMIER", img: "https://premy.id/assets/images/games/1716206019_3a1a9233fd3e2b700f2b.webp", link: "#", status: "ready" },
        { name: "VISION+ / K-VISION SPORT", img: "https://logowik.com/content/uploads/images/vision-plus-20219005.logowik.com.webp", link: "#", status: "ready" },
        { name: "VIU PREMIUM", img: "https://premy.id/assets/images/games/1716440566_1d882c4abb76c6aca6c0.webp", link: "#", status: "ready" },
        { name: "VPN EXPRESS", img: "https://xv.imgix.net/photos/xv/Red-preview-f8f8e432661063d4ffe1a4b96dd9e4be.png?s=9be796d9e09e46e0414cca1653e07c20", link: "#", status: "ready" },
        { name: "VPN HMA", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8u9DCTp85Mp2EudJRB_9yemL_6VcnTIbY9A&s", link: "#", status: "ready" },
        { name: "VPN SURFSHARK", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS51GX3mpbu5zhDfiVBMdf99pJ8QkLDM9XsPA&s", link: "#", status: "ready" },
        { name: "WETV VIP", img: "https://epstore.id/file/images/1e6d73faf08ad3db4eb629b3569cd04a.jpg", link: "#", status: "ready" },
        { name: "WINK VIP", img: "https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/6a/c3/78/6ac37852-6e65-9d37-db77-f74ef4a0dabb/WinkStudio.png/1200x600wa.png", link: "#", status: "ready" },
        { name: "YOUTUBE PREMIUM", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2U8mQXb6RVzVWjE4nRS6DDNWcpUFyLuSOqA&s", link: "#", status: "ready" },
        { name: "ZOOM PRO", img: "https://premy.id/assets/images/games/1741494396_03f394b14332a67bc4c4.png", link: "#", status: "ready" }
    ];

    const productList = document.getElementById("productList");
    const searchInput = document.getElementById("searchInput");
    const modal = document.getElementById("modal");
    
    // Elemen Input Modal
    const modalImage = document.getElementById("modalImage");
    const modalName = document.getElementById("modalName");
    const periodSelect = document.getElementById("periodSelect");
    const quantityInput = document.getElementById("quantityInput");
    const contactInput = document.getElementById("contactInput");
    const submitOrder = document.getElementById("submitOrder");
    const statusMessage = document.getElementById("statusMessage");

    let currentProduct = null;

    // Render List Produk
    function renderProducts(filter = "") {
        productList.innerHTML = "";
        const filtered = items.filter(item => item.name.toLowerCase().includes(filter.toLowerCase()));
        
        if (filtered.length === 0) {
            productList.innerHTML = '<p class="no-results"><i class="fas fa-box-open fa-2x mb-2 block"></i><br>Produk tidak ditemukan.</p>';
            return;
        }
        
        filtered.forEach((item) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/150'" />
                <h4>${item.name}</h4>
                <div><span class="status ${item.status}">${item.status === "ready" ? "Ready" : "Pending"}</span></div>
            `;
            card.addEventListener("click", () => openModal(item));
            productList.appendChild(card);
        });
    }

    // Buka Modal
    function openModal(product) {
        currentProduct = product;
        modalImage.src = product.img;
        modalName.textContent = product.name;
        
        // Reset Form
        periodSelect.value = "1bulan";
        quantityInput.value = 1;
        
        // Ambil kontak dari cache jika ada
        const savedContact = localStorage.getItem("user_contact_app");
        contactInput.value = savedContact ? savedContact : "";
        
        statusMessage.textContent = "";
        submitOrder.innerHTML = "Pesan Sekarang";
        submitOrder.disabled = false;
        
        modal.classList.add("show");
    }

    // Tutup Modal
    function closeModalFunc() {
        modal.classList.remove("show");
    }

    document.getElementById("closeModal").addEventListener("click", closeModalFunc);
    window.addEventListener("click", e => { if (e.target === modal) closeModalFunc(); });

    // Format Periode String
    function parsePeriod(value) {
        const match = value.match(/^(\d+)([a-zA-Z]+)$/);
        if (!match) return value;
        return `${match[1]} ${match[2].charAt(0).toUpperCase() + match[2].slice(1)}`;
    }

    // Kirim Order ke Telegram
    submitOrder.addEventListener("click", async () => {
        const period = periodSelect.value;
        const quantity = quantityInput.value;
        const contact = contactInput.value.trim();

        if (!contact) {
            statusMessage.style.color = "#d32f2f";
            statusMessage.innerHTML = "<i class='fas fa-exclamation-circle'></i> Mohon isi kontak Anda.";
            return;
        }

        // Simpan kontak agar user tidak perlu mengetik ulang nanti
        localStorage.setItem("user_contact_app", contact);

        // Ubah tombol jadi loading
        submitOrder.disabled = true;
        submitOrder.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim...';
        statusMessage.textContent = "";

        // Token dan Chat ID Telegram
        const BOT_TOKEN = "7819700390:AAEO8_9_5Xr8msBPZd2hOQ4CkxDnlHVS3b8";
        const CHAT_ID = "5775563021";
        
        const message = 
            `🛒 *PESANAN APLIKASI BARU*\n` +
            `━━━━━━━━━━━━━━━━━━━━\n` +
            `📦 *Produk:* ${currentProduct.name}\n` +
            `⏳ *Periode:* ${parsePeriod(period)}\n` + 
            `🔢 *Jumlah:* ${quantity}\n` +
            `📞 *Kontak:* \`${contact}\``;

        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: "Markdown" })
            });
            const data = await res.json();

            if (data.ok) {
                statusMessage.style.color = "#2e7d32";
                statusMessage.innerHTML = "<i class='fas fa-check-circle'></i> Pesanan terkirim! Admin akan segera menghubungi.";
                setTimeout(() => closeModalFunc(), 2500);
            } else {
                throw new Error("Gagal dari server Telegram");
            }
        } catch (error) {
            statusMessage.style.color = "#d32f2f";
            statusMessage.innerHTML = "<i class='fas fa-times-circle'></i> Gagal mengirim pesanan. Cek koneksi Anda.";
            submitOrder.disabled = false;
            submitOrder.innerHTML = "Coba Lagi";
        }
    });

    // Inisialisasi awal
    renderProducts();
    
    // Pencarian
    searchInput.addEventListener("input", () => {
        renderProducts(searchInput.value);
    });
</script>

</html>
