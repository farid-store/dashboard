<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Harga Produk Digital | Farid Store</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background: linear-gradient(135deg, #7367f0 0%, #9b8cfb 100%);
            padding: 20px;
            border-radius: 12px 12px 0 0;
            color: white;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            user-select: none;
            text-align: left;
            box-shadow: 0 4px 12px rgba(115, 103, 240, 0.2);
        }

        .header h2 { margin: 0; font-size: 1.6rem; }
        .breadcrumb { opacity: 0.9; font-size: 0.9rem; margin-top: 5px; }

        .main-content {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 0 0 12px 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: left;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
        }

        /* Styling Search Bar dengan Icon */
        .search-container {
            position: relative;
            max-width: 350px;
            margin-bottom: 25px;
        }
        .search-container i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #888;
        }
        #searchInput {
            width: 100%; 
            padding: 12px 15px 12px 45px;
            font-size: 1rem;
            border-radius: 10px;
            border: 1px solid #dcdde1;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        #searchInput:focus {
            outline: none;
            border-color: #7367f0;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(115, 103, 240, 0.15);
        }

        /* Container Table untuk Scroll Desktop */
        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: 0 0 0 1px #e0e0e0; /* Border halus */
            /* Batasi tinggi tabel di PC agar header bisa sticky */
            max-height: 70vh; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            min-width: 800px; /* Mencegah tabel menyempit di PC */
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
            font-size: 0.95rem;
        }

        /* Sticky Header Logic */
        th {
            background-color: #f8f9fa;
            color: #444;
            font-weight: 700;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); /* Bayangan saat di-scroll */
        }

        tr:hover td { background-color: #fcfcff; }
        
        /* Font bold untuk nama produk */
        td:nth-child(2) { font-weight: 600; color: #2c3e50; text-align: left; }

        img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
            background-color: #f4f6f9;
            padding: 2px;
        }

        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }
        .status-ready { background-color: #e8f5e9; color: #2e7d32; }
        .status-pending { background-color: #fff8e1; color: #f57f17; }

        /* Responsive Mobile (Grid Card Style) */
        @media (max-width: 768px) {
            .main-content { padding: 20px 15px; }
            .table-container { 
                box-shadow: none; 
                max-height: none; /* Matikan scroll tinggi di mobile */
                overflow: visible; 
            }
            table { min-width: 100%; }
            table, thead, tbody, th, td, tr { display: block; }
            
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            
            tbody tr {
                margin-bottom: 20px;
                background: #fff;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
                border: 1px solid #f0f2f5;
                padding: 15px;
                border-radius: 12px;
                display: flex;
                flex-wrap: wrap;
                justify-content: space-between;
                align-items: center;
            }
            
            tbody td {
                text-align: left;
                padding: 8px 0;
                border-bottom: none;
                width: 100%;
                position: relative;
                font-size: 0.9rem;
            }
            
            tbody td::before {
                content: attr(data-label);
                font-weight: 600;
                width: 100px;
                display: inline-block;
                color: #888;
                font-size: 0.85rem;
            }

            /* Atur ulang urutan visual untuk mobile */
            tbody td:first-child { text-align: center; margin-bottom: 10px; width: 100%; }
            tbody td:first-child::before { display: none; }
            
            tbody td:nth-child(2) { font-size: 1.1rem; text-align: center; margin-bottom: 10px; }
            tbody td:nth-child(2)::before { display: none; }
            
            tbody td:nth-child(3) { display: flex; justify-content: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
            tbody td:nth-child(3)::before { display: none; }

            /* Kolom Harga di Mobile (dibuat 2 baris) */
            tbody td:nth-child(n+4) { 
                width: 50%; 
                text-align: right; 
                font-weight: 600;
            }
            tbody td:nth-child(n+4)::before { width: auto; float: left; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Daftar Harga</h2>
        <p class="breadcrumb">Informasi &gt; Harga Produk Digital</p>
    </div>
    
    <div class="main-content">
        <h1>Pricelist Produk & Layanan</h1>
        
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari nama produk..." autocomplete="off" />
        </div>

        <div class="table-container">
            <table id="priceTable">
                <thead>
                    <tr>
                        <th>Gambar</th>
                        <th style="text-align: left;">Produk</th>
                        <th>Status</th>
                        <th>1 Hari</th>
                        <th>7 Hari</th>
                        <th>1 Bulan</th>
                        <th>3 Bulan</th>
                        <th>12 Bulan</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="8" style="text-align:center; padding: 40px; color: #888;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Data produk (Sama seperti punya Anda)
        const products_data = [
            { "name": "AI CHAT GPT+", "img": "https://img.icons8.com/ios7/600/chatgpt.png", "status": "ready", "price1d": 0, "price7d": 10000, "price1m": 20000, "price3m": 0, "price1y": 0 },
            { "name": "AI CLAUDE", "img": "https://img.icons8.com/fluent/512/claude.png", "status": "ready", "price1d": 0, "price7d": 30000, "price1m": 65000, "price3m": 0, "price1y": 0 },
            { "name": "AI GEMINI ADVANCE", "img": "https://static.vecteezy.com/system/resources/previews/046/861/646/non_2x/gemini-icon-on-a-transparent-background-free-png.png", "status": "ready", "price1d": 0, "price7d": 0, "price1m": 20000, "price3m": 0, "price1y": 0 },
            { "name": "AI PERPLEXITY", "img": "https://play.ht/blog/wp-content/uploads/2024/05/perplexityai-logo.webp", "status": "pending", "price1d": 0, "price7d": 0, "price1m": 0, "price3m": 0, "price1y": 0 },
            { "name": "ALIGHT MOTION PRO", "img": "https://premy.id/assets/images/games/1741494001_7de345014f2295f78c0b.webp", "status": "ready", "price1d": 2000, "price7d": 0, "price1m": 6000, "price3m": 0, "price1y": 10000 },
            { "name": "CANVA PRO", "img": "https://premy.id/assets/images/games/1741494656_3685111874317a0d0b81.webp", "status": "ready", "price1d": 0, "price7d": 0, "price1m": 3000, "price3m": 0, "price1y": 17000 },
            { "name": "CAPCUT PRO", "img": "https://premy.id/assets/images/games/1741406710_2def8b55162ab3c31a7d.webp", "status": "ready", "price1d": 0, "price7d": 8000, "price1m": 15000, "price3m": 0, "price1y": 0 },
            { "name": "DEEPL PREMIUM", "img": "https://images.seeklogo.com/logo-png/50/2/deepl-logo-png_seeklogo-506973.png", "status": "ready", "price1d": 3000, "price7d": 9000, "price1m": 23000, "price3m": 56000, "price1y": 200000 },
            { "name": "NETFLIX PREMIUM UHD", "img": "https://premy.id/assets/images/games/1741494608_13916cad116dd700e814.png", "status": "ready", "price1d": 0, "price7d": 0, "price1m": 30000, "price3m": 0, "price1y": 0 },
            { "name": "SPOTIFY PREMIUM", "img": "https://premy.id/assets/images/games/1741494763_ff055ddde1a95919e310.webp", "status": "ready", "price1d": 0, "price7d": 0, "price1m": 22000, "price3m": 0, "price1y": 0 },
            { "name": "YOUTUBE & MUSIC", "img": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2U8mQXb6RVzVWjE4nRS6DDNWcpUFyLuSOqA&s", "status": "ready", "price1d": 0, "price7d": 0, "price1m": 6000, "price3m": 0, "price1y": 40000 }
            // Note: Masukkan kembali data Anda secara penuh di sini
        ];

        const tbody = document.querySelector("#priceTable tbody");
        const searchInput = document.getElementById("searchInput");

        // Format Rupiah yang Lebih Bersih (Menghilangkan tulisan "KOSONG")
        function formatRupiah(number) {
            if (!number || number === 0) {
                // Return garis strip abu-abu agar tabel tidak terlalu ramai visualnya
                return `<span style="color: #cbd5e1; font-weight: normal;">-</span>`;
            }
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(number);
        }

        function renderTable(filter = "") {
            tbody.innerHTML = ""; 
            
            const filtered = products_data.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 40px; color: #888;"><i class="fas fa-box-open fa-2x mb-2 block"></i><br>Produk tidak ditemukan.</td></tr>`;
                return;
            }

            filtered.forEach(p => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td data-label="Gambar"><img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/50'" /></td>
                    <td data-label="Produk">${p.name}</td>
                    <td data-label="Status">
                        <span class="status ${p.status === "ready" ? "status-ready" : "status-pending"}">${p.status.toUpperCase()}</span>
                    </td>
                    <td data-label="1 Hari">${formatRupiah(p.price1d)}</td>
                    <td data-label="7 Hari">${formatRupiah(p.price7d)}</td>
                    <td data-label="1 Bulan">${formatRupiah(p.price1m)}</td>
                    <td data-label="3 Bulan">${formatRupiah(p.price3m)}</td>
                    <td data-label="12 Bulan">${formatRupiah(p.price1y)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(""); 
        });

        searchInput.addEventListener("input", () => {
            renderTable(searchInput.value);
        });
    </script>

</body>
</html>
