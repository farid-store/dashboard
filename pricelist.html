<head>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background: linear-gradient(135deg, #7367f0 0%, #9b8cfb 100%);
            padding: 20px;
            border-radius: 12px 12px 0 0;
            color: white;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            user-select: none;
            text-align: left;
            box-shadow: 0 4px 12px rgba(115, 103, 240, 0.2);
        }

        .header h2 { margin: 0; font-size: 1.6rem; }
        .breadcrumb { opacity: 0.9; font-size: 0.9rem; margin-top: 5px; }

        .main-content {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 0 0 12px 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: left;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
        }

        /* Styling Search Bar dengan Icon */
        .search-container {
            position: relative;
            max-width: 350px;
            margin-bottom: 25px;
        }
        .search-container i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #888;
        }
        #searchInput {
            width: 100%; 
            padding: 12px 15px 12px 45px;
            font-size: 1rem;
            border-radius: 10px;
            border: 1px solid #dcdde1;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        #searchInput:focus {
            outline: none;
            border-color: #7367f0;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(115, 103, 240, 0.15);
        }

        /* Container Table untuk Scroll Desktop */
        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: 0 0 0 1px #e0e0e0;
            max-height: 70vh; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            min-width: 800px;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
            font-size: 0.95rem;
        }

        /* Sticky Header Logic */
        th {
            background-color: #f8f9fa;
            color: #444;
            font-weight: 700;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        tr:hover td { background-color: #fcfcff; }
        
        td:nth-child(2) { font-weight: 600; color: #2c3e50; text-align: left; }

        img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
            background-color: #f4f6f9;
            padding: 2px;
        }

        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }
        .status-ready { background-color: #e8f5e9; color: #2e7d32; }
        .status-pending { background-color: #fff8e1; color: #f57f17; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .main-content { padding: 20px 15px; }
            .table-container { 
                box-shadow: none; 
                max-height: none; 
                overflow: visible; 
            }
            table { min-width: 100%; }
            table, thead, tbody, th, td, tr { display: block; }
            
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            
            tbody tr {
                margin-bottom: 20px;
                background: #fff;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05);
                border: 1px solid #f0f2f5;
                padding: 15px;
                border-radius: 12px;
                display: flex;
                flex-wrap: wrap;
                justify-content: space-between;
                align-items: center;
            }
            
            tbody td {
                text-align: left;
                padding: 8px 0;
                border-bottom: none;
                width: 100%;
                position: relative;
                font-size: 0.9rem;
            }
            
            tbody td::before {
                content: attr(data-label);
                font-weight: 600;
                width: 100px;
                display: inline-block;
                color: #888;
                font-size: 0.85rem;
            }

            tbody td:first-child { text-align: center; margin-bottom: 10px; width: 100%; }
            tbody td:first-child::before { display: none; }
            
            tbody td:nth-child(2) { font-size: 1.1rem; text-align: center; margin-bottom: 10px; }
            tbody td:nth-child(2)::before { display: none; }
            
            tbody td:nth-child(3) { display: flex; justify-content: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
            tbody td:nth-child(3)::before { display: none; }

            tbody td:nth-child(n+4) { 
                width: 50%; 
                text-align: right; 
                font-weight: 600;
            }
            tbody td:nth-child(n+4)::before { width: auto; float: left; }
        }
    </style>
</head>

        // Format Rupiah (Menggunakan strip agar lebih clean dari KOSONG)
        function formatRupiah(number) {
            if (!number || number === 0) {
                return `<span style="color: #cbd5e1; font-weight: normal;">-</span>`;
            }
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(number);
        }

        function renderTable(filter = "") {
            tbody.innerHTML = ""; 
            
            const filtered = products_data.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 40px; color: #888;"><i class="fas fa-box-open fa-2x mb-2 block"></i><br>Produk tidak ditemukan.</td></tr>`;
                return;
            }

            filtered.forEach(p => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td data-label="Gambar"><img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/50'" /></td>
                    <td data-label="Produk">${p.name}</td>
                    <td data-label="Status">
                        <span class="status ${p.status === "ready" ? "status-ready" : "status-pending"}">${p.status.toUpperCase()}</span>
                    </td>
                    <td data-label="1 Hari">${formatRupiah(p.price1d)}</td>
                    <td data-label="7 Hari">${formatRupiah(p.price7d)}</td>
                    <td data-label="1 Bulan">${formatRupiah(p.price1m)}</td>
                    <td data-label="3 Bulan">${formatRupiah(p.price3m)}</td>
                    <td data-label="12 Bulan">${formatRupiah(p.price1y)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(""); 
        });

        searchInput.addEventListener("input", () => {
            renderTable(searchInput.value);
        });
    </script>

</body>
</html>
